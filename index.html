<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Task Manager (Gmail Style)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="login-view">
        <img src="https://www.gstatic.com/images/branding/googlelogo/2x/googlelogo_color_272x92dp.png" height="50" class="login-logo">
        <h1 class="login-title">Sign in to Task Manager</h1>
        <button id="login-btn" class="btn-primary login-btn">Google でログイン</button>
    </div>

    <div class="top-bar">
        <div class="logo-area">
            <img src="https://ssl.gstatic.com/ui/v1/icons/mail/rfr/gmail.ico" alt="Gmail">
            <span>Gmail Task Manager</span>
        </div>
        <div class="user-area">
            <button id="sync-btn" class="action-icon sync-btn" title="手動同期">↻</button>
            <span id="sync-status" class="sync-status">Ready</span>
            <div id="user-info" class="user-info">Guest User</div>
        </div>
    </div>

    <div class="main-container">
        <aside class="sidebar">
            <div id="nav-tasks" class="nav-item active">Feed (Inbox)</div>
            <div id="nav-archive" class="nav-item">Archive (Done)</div>
            <div id="nav-settings" class="nav-item">Settings</div>
        </aside>

        <main id="app-view" class="content-area hidden">
            <div id="feed-view" class="view">
                <div class="view-header">
                    <h2>Primary Tasks</h2>
                    <div class="view-subtitle">Action required items</div>
                </div>
                <div id="task-summary"></div>
                <div id="task-list" class="task-list"></div>
            </div>

            <div id="archive-view" class="view hidden">
                <div class="view-header">
                    <h2>All Completed</h2>
                </div>
                <div id="archive-list" class="task-list"></div>
            </div>
        </main>

        <aside class="right-panel">
            <div class="chat-container">
                <h3 class="chat-title">Side Panel Chat</h3>
                <div id="chat-history" class="chat-history"></div>
                <div class="input-group">
                    <input type="text" id="chat-input" placeholder="Ask AI..." class="input-field">
                    <button id="send-chat-btn" class="btn-circle">➤</button>
                </div>
            </div>
        </aside>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal" class="modal">
        <div class="modal-content">
            <h2 class="modal-title">Settings</h2>

            <div class="settings-form">
                <div class="setting-item">
                    <label class="setting-label">Google Client ID</label>
                    <input type="text" id="client-id-input" placeholder="Enter OAuth Client ID" class="setting-input">
                </div>

                <div class="setting-item">
                    <label class="setting-label">Gemini API Key</label>
                    <input type="password" id="gemini-key-input" placeholder="Enter Gemini Key" class="setting-input">
                </div>

                <div class="setting-item">
                    <div class="setting-row">
                        <label class="setting-label">Gemini Model</label>
                        <button id="fetch-models-btn" class="btn-outline">利用可能なモデルをロード</button>
                    </div>
                    <select id="gemini-model-select" class="setting-select">
                        <option value="gemini-1.5-flash">gemini-1.5-flash (Default)</option>
                        <option value="gemini-1.5-pro">gemini-1.5-pro</option>
                        <option value="custom">-- Custom ID --</option>
                    </select>
                    <input type="text" id="gemini-custom-model" placeholder="Enter Custom Model ID" class="setting-input hidden">
                </div>

                <div class="setting-item">
                    <label class="setting-label">Extraction Criteria (AI Prompt)</label>
                    <textarea id="criteria-textarea" placeholder="Describe what to extract..." class="setting-textarea"></textarea>
                </div>
            </div>

            <div class="modal-actions">
                <button id="cancel-settings-btn" class="btn-outline">Cancel</button>
                <button id="save-settings-btn" class="btn-primary">Save Changes</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script src="https://accounts.google.com/gsi/client" onload="gisLoaded()"></script>
</body>
</html>
