<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Task Oracle | AI Workspace Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="login-view" class="auth-container">
        <h1 style="font-size: 3rem; font-weight: 700; margin-bottom: 0.5rem; background: linear-gradient(135deg, #fff, #94a3b8); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;">Google Task Oracle</h1>
        <p style="color: var(--text-dim); margin-bottom: 2.5rem; max-width: 500px;">
            Google Chat と Gmail から重要なアクションをAIが抽出し、優先順位を付けて整理します。<br>
            GitHub Pages 上で動作する純粋なクライアントサイド・ツールです。
        </p>
        <button id="login-btn" class="btn" style="display: none;">Google でログイン</button>
        <div id="setup-initial" style="margin-top: 1rem; color: var(--text-dim); font-size: 0.9rem; display: none;">
            ※初めて利用する場合は Settings から Client ID と API Key を設定してください
        </div>
    </div>

    <div id="app-view" class="dashboard" style="display: none;">
        <div class="sidebar glass-panel">
            <h2 style="margin-bottom: 2rem;">Menu</h2>
            <nav style="display: flex; flex-direction: column; gap: 1rem;">
                <div id="nav-tasks" style="cursor: pointer; padding: 10px; border-radius: 8px; background: rgba(255,255,255,0.05);">Tasks</div>
                <div id="nav-settings" style="cursor: pointer; padding: 10px; border-radius: 8px;">Settings (AI条件設定)</div>
                <div style="cursor: pointer; padding: 10px; border-radius: 8px;">History</div>
                <hr style="border: 0; border-top: 1px solid var(--glass-border); margin: 1rem 0;">
                <div id="sync-status" style="font-size: 0.8rem; color: var(--text-dim);">Last synced: Just now</div>
                <button id="sync-btn" class="btn" style="margin-top: auto; padding: 8px 16px; font-size: 0.85rem;">手動同期</button>
            </nav>
        </div>
    <!-- Scripts at the bottom -->
    <script src="app.js"></script>
    <script src="https://accounts.google.com/gsi/client" onload="initGis()" async defer></script>
    <script src="https://apis.google.com/js/api.js" onload="gapiLoaded()" async defer></script>
</body>
</html>
