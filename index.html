<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Task Manager (Gmail Style)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="login-view">
        <img src="https://www.gstatic.com/images/branding/googlelogo/2x/googlelogo_color_272x92dp.png" height="50" style="margin-bottom: 24px;">
        <h1 style="font-size: 24px; margin-bottom: 40px; font-weight: 400;">Sign in to Task Manager</h1>
        <button id="login-btn" class="btn-primary" style="padding: 12px 40px; font-size: 16px;">Google でログイン</button>
    </div>

    <div class="top-bar">
        <div class="logo-area">
            <img src="https://ssl.gstatic.com/ui/v1/icons/mail/rfr/gmail.ico" alt="Gmail">
            <span>Gmail Task Manager</span>
        </div>
        <div class="user-area">
            <span id="sync-status" style="color: var(--gmail-text-dim);">Ready</span>
            <div id="user-info" style="font-weight: 500;">Guest User</div>
        </div>
    </div>

    <div class="main-container">
        <aside class="sidebar">
            <button id="sync-btn" class="compose-btn">
                <span style="font-size: 24px;">↻</span>
                <span>手動同期</span>
            </button>
            <div id="nav-tasks" class="nav-item active">Feed (Inbox)</div>
            <div id="nav-archive" class="nav-item">Archive (Done)</div>
            <div id="nav-settings" class="nav-item">Settings</div>
        </aside>

        <main id="app-view" class="content-area" style="display: none;">
            <div id="feed-view" class="view">
                <div class="view-header">
                    <h2>Primary Tasks</h2>
                    <div style="font-size: 12px; color: var(--gmail-text-dim);">Action required items</div>
                </div>
                <div id="task-list" class="task-list"></div>
            </div>

            <div id="archive-view" class="view" style="display: none;">
                <div class="view-header">
                    <h2>All Completed</h2>
                </div>
                <div id="archive-list" class="task-list"></div>
            </div>
        </main>

        <aside class="right-panel">
            <div class="chat-container">
                <h3 style="font-size: 14px; margin-bottom: 16px; color: var(--gmail-text-dim);">Side Panel Chat</h3>
                <div id="chat-history"></div>
                <div class="input-group">
                    <input type="text" id="chat-input" placeholder="Ask AI..." class="input-field">
                    <button id="send-chat-btn" class="btn-circle">➤</button>
                </div>
            </div>
        </aside>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal" class="modal">
        <div class="modal-content">
            <h2 style="font-weight: 400; margin-bottom: 24px;">Settings</h2>
            <div style="display: flex; flex-direction: column; gap: 16px;">
                <div>
                    <label style="display: block; margin-bottom: 4px; font-size: 12px;">Google Client ID</label>
                    <input type="text" id="client-id-input" style="width:100%; padding:10px; border:1px solid var(--gmail-border); border-radius:4px;">
                </div>
                <div>
                    <label style="display: block; margin-bottom: 4px; font-size: 12px;">Gemini API Key</label>
                    <input type="password" id="gemini-key-input" style="width:100%; padding:10px; border:1px solid var(--gmail-border); border-radius:4px;">
                </div>
                <div>
                    <label style="display: block; margin-bottom: 4px; font-size: 12px;">Gemini Model</label>
                    <select id="gemini-model-select" style="width:100%; padding:10px; border:1px solid var(--gmail-border); border-radius:4px;">
                        <option value="gemini-1.5-flash">gemini-1.5-flash</option>
                        <option value="custom">-- Custom --</option>
                    </select>
                    <input type="text" id="gemini-custom-model" placeholder="Model ID" style="display:none; width:100%; padding:10px; border:1px solid var(--gmail-border); border-radius:4px; margin-top: 8px;">
                </div>
                <div>
                    <label style="display: block; margin-bottom: 4px; font-size: 12px;">Extraction Criteria</label>
                    <textarea id="criteria-textarea" style="width:100%; height:80px; padding:10px; border:1px solid var(--gmail-border); border-radius:4px;"></textarea>
                </div>
            </div>
            <div style="margin-top: 32px; display: flex; justify-content: flex-end; gap: 12px;">
                <button id="cancel-settings-btn" class="btn-outline">Cancel</button>
                <button id="save-settings-btn" class="btn-primary">Save Changes</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script src="https://accounts.google.com/gsi/client" onload="gisLoaded()"></script>
</body>
</html>
